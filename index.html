<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المزرعة الذكية - Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="light">

    <nav id="sideMenu" class="side-nav">
        <button class="close-btn" onclick="toggleMenu()">&times;</button>
        <div class="menu-content">
            <div class="menu-section">
                <h4><i class="fas fa-user-circle"></i> حساب جوجل (اختياري)</h4>
                <button onclick="googleSignIn()"><i class="fab fa-google"></i> <span id="menuUserStatus">تسجيل الدخول</span></button>
            </div>
            <div class="menu-section">
                <h4><i class="fas fa-link"></i> خيارات الاتصال المباشر</h4>
                <button onclick="connect('Bluetooth')"><i class="fab fa-bluetooth"></i> اتصال بلوتوث</button>
                <button onclick="connect('Serial')"><i class="fas fa-usb"></i> اتصال كابل (Serial)</button>
                <button onclick="connect('IP')"><i class="fas fa-wifi"></i> اتصال عبر IP/WiFi</button>
            </div>
            <div class="menu-section">
                <h4><i class="fas fa-palette"></i> المظهر</h4>
                <button onclick="toggleDarkMode()"><i class="fas fa-moon"></i> تبديل الوضع الليلي</button>
            </div>
        </div>
    </nav>

    <header class="main-header">
        <div class="header-right">
            <button class="burger-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
            <div class="date-time-display">
                <div id="headerDate">--/--/----</div>
                <div id="headerTime">00:00:00</div>
            </div>
        </div>
        
        <div class="header-left">
            <div class="google-account-chip" onclick="googleSignIn()">
                <span id="userStatus">زائر</span>
                <div class="user-icon"><i class="fas fa-user"></i></div>
            </div>
        </div>
    </header>

    <section class="weather-section">
        <div class="search-box">
            <input type="text" id="citySearch" placeholder="ابحث عن مدينة...">
            <button onclick="searchWeather()"><i class="fas fa-search"></i></button>
            <button class="gps-btn" onclick="getUserLocation()"><i class="fas fa-crosshairs"></i></button>
        </div>
        <div id="weatherDisplay" class="weather-info">جاري تحديد الموقع...</div>
    </section>

    <main class="container">
        <div class="card sensor-card">
            <h3><i class="fas fa-chart-line"></i> البيانات الحية</h3>
            <div class="sensors-grid">
                <div class="s-item">الحرارة<br><span id="temp">0</span>°م</div>
                <div class="s-item">الرطوبة<br><span id="hum">0</span>%</div>
                <div class="s-item">التربة pH<br><span id="ph">0.0</span></div>
                <div class="s-item">الخزان<br><span id="water">0</span>%</div>
            </div>
        </div>

        <div class="card control-card">
            <h3><i class="fas fa-cogs"></i> التحكم بالأنظمة</h3>
            <div class="main-toggle-wrapper">
                <span>نمط التشغيل:</span>
                <button id="systemModeBtn" class="mode-toggle-btn manual" onclick="toggleSystemMode()">
                    <span id="modeText">يدوي</span>
                    <div class="toggle-indicator"></div>
                </button>
            </div>
            <div class="manual-controls" id="manualControls">
                <button class="ctrl-btn" id="lightBtn" onclick="toggleDevice('light')"><i class="fas fa-lightbulb"></i> الإضاءة</button>
                <button class="ctrl-btn" id="pumpBtn" onclick="toggleDevice('pump')"><i class="fas fa-tint"></i> المضخة</button>
            </div>
        </div>

        <div class="card plant-card">
            <h3><i class="fas fa-seedling"></i> محلل توافق النباتات</h3>
            <select id="plantSelector" onchange="updatePlantAnalysis()"></select>
            <div id="plantAnalysis" class="analysis-box">اختر نبتة لمقارنة الظروف الحالية...</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
